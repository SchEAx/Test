    function formatDateTime(value) {
      if (!value) return "-";
      return new Date(value).toLocaleString("tr-TR");
    }

    function formatMoney(value) {
      const num = Number(value || 0);
      return new Intl.NumberFormat("tr-TR", {
        style: "currency",
        currency: "TRY",
        maximumFractionDigits: 2,
      }).format(num);
    }

    function safeParseJson(value, fallback = {}) {
      try {
        return value ? JSON.parse(value) : fallback;
      } catch {
        return fallback;
      }
    }

    function recordTotal(record) {
      return (record.operations || []).reduce((sum, op) => sum + Number(op.fee || 0), 0);
    }
    function grandTotal(records) {
  return (records || []).reduce((sum, record) => sum + recordTotal(record), 0);
}
    function normalizePlate(value) {
  return String(value || "")
    .toUpperCase()
    .replace(/\s+/g, "")
    .trim();
}

function isToday(value) {
  if (!value) return false;
  const d = new Date(value);
  const now = new Date();
  return (
    d.getFullYear() === now.getFullYear() &&
    d.getMonth() === now.getMonth() &&
    d.getDate() === now.getDate()
  );
}

function todayTotal(records) {
  return (records || [])
    .filter((r) => isToday(r.createdAt))
    .reduce((sum, r) => sum + recordTotal(r), 0);
}

function todayCount(records) {
  return (records || []).filter((r) => isToday(r.createdAt)).length;
}

function plateHistory(plate, currentId = null) {
  const normalized = normalizePlate(plate);
  if (!normalized) return [];
  return (state.records || []).filter((r) => {
    if (currentId && r.id === currentId) return false;
    return normalizePlate(r.plaka) === normalized;
  });

    async function dbFetchRecords({ offset = 0, limit = PAGE_SIZE, search = "", status = "Tümü" } = {}) {
      const params = new URLSearchParams();
      params.set("select", "*");
      params.set("order", "id.desc");

      if (status && status !== "Tümü") {
        params.set("status", `eq.${status}`);
      }

      const trimmed = (search || "").trim();
      if (trimmed) {
  const safe = trimmed.replace(/,/g, " ").replace(/\*/g, "");
  params.set(
    "or",
    `record_no.ilike.*${safe}*,customer_name.ilike.*${safe}*,phone.ilike.*${safe}*,brand.ilike.*${safe}*,model.ilike.*${safe}*,plaka.ilike.*${safe}*,issue.ilike.*${safe}*,notes.ilike.*${safe}*`
  );
}

      const res = await fetch(`${SUPABASE_URL}/rest/v1/records?${params.toString()}`, {
        headers: apiHeaders({
          Range: `${offset}-${offset + limit - 1}`,
          Prefer: "count=exact"
        }),
      });

      if (!res.ok) throw new Error("Kayıtlar alınamadı");
      const data = await res.json();
      const rangeHeader = res.headers.get("content-range") || "0-0/0";
      const totalPart = rangeHeader.split("/")[1] || "0";
      const total = Number(totalPart) || 0;
      return { data, total };
    }

    function resizeImage(file, maxWidth = 1280, quality = 0.72) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    alert("Zorunlu alanlar: Müşteri Ad-Soyadı, Telefon, Araç Marka, Araç Modeli, En az 1 işlem ve ücret.");

  if (!form.kvkkOnay || !form.musteriOnay) {
    alert("Lütfen gerekli onay kutularını işaretleyin!");
    return;

    ...form,

    function downloadFile(filename, content, type = "application/json") {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function toCsv(rows) {
      const headers = [
        "Kayıt No", "Kayıt Tarihi", "Müşteri", "Telefon", "Fatura Adresi", "Araç Marka", "Araç Modeli",
        "Yapılacak İşlemler", "İşlem Ücretleri", "Toplam Tutar", "Araçta Görülen Kusurlar", "Usta", "Durum", "Ek Notlar"
      ];

      const escapeCsv = (v) => {
        const value = String(v ?? "");
        if (value.includes(",") || value.includes("\n") || value.includes('"')) {
          return '"' + value.replace(/"/g, '""') + '"';
        }
        return value;
      };

      const lines = rows.map((r) => {
        const feeText = (r.operations || []).map((op) => `${op.name}: ${op.fee || 0}`).join(" | ");
        return [
          r.recordNo,
          formatDateTime(r.createdAt),
          r.customerName,
          r.phone,
          r.invoiceAddress || "",
          r.brand,
          r.model,
          (r.operations || []).map((op) => op.name).join(", "),
          feeText,
          recordTotal(r),
          r.vehicleDefects || "",
          r.technician || "",
          r.status || "",
          r.noteText || ""
        ].map(escapeCsv).join(",");
      });

      return [headers.join(","), ...lines].join("\n");
    }

    function exportCsv() {
      downloadFile("musteri-kayitlari.csv", toCsv(state.records), "text/csv;charset=utf-8;");

    function setupSignaturePad() {
  if (state.activeTab !== "kayit") return;

  const canvas = document.getElementById("signaturePad");
  if (!canvas) return;

  const ctx = canvas.getContext("2d");
  let drawing = false;

  function resizeCanvas(keepSignature = true) {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    const rect = canvas.getBoundingClientRect();

    const oldSignature = keepSignature ? state.form.signature : "";

    canvas.width = Math.max(1, Math.floor(rect.width * ratio));
    canvas.height = Math.max(1, Math.floor(180 * ratio));

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(ratio, ratio);

    repaint(oldSignature);
  }

  function repaint(signatureData = state.form.signature) {
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    ctx.fillStyle = "#09090b";
    ctx.fillRect(0, 0, rect.width, rect.height);

    if (signatureData) {
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, rect.width, rect.height);
      };
      img.src = signatureData;
    }
  }

  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    return {
      x: point.clientX - rect.left,
      y: point.clientY - rect.top
    };
  };

  const start = (e) => {
    drawing = true;
    const { x, y } = getPos(e);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#ffffff";
  };

  const move = (e) => {
    if (!drawing) return;
    if (e.cancelable) e.preventDefault();
    const { x, y } = getPos(e);
    ctx.lineTo(x, y);
    ctx.stroke();
  };

  const end = () => {
    if (!drawing) return;
    drawing = false;
    state.form.signature = canvas.toDataURL("image/png");
  };

  resizeCanvas(true);

  if (!canvas.dataset.bound) {
    canvas.onmousedown = start;
    canvas.onmousemove = move;
    canvas.onmouseup = end;
    canvas.onmouseleave = end;

    canvas.ontouchstart = start;
    canvas.ontouchmove = move;
    canvas.ontouchend = end;

    canvas.dataset.bound = "1";

    document.getElementById("clearSignature")?.addEventListener("click", () => {
      state.form.signature = "";
      repaint("");
    });

    window.addEventListener("resize", () => {
      resizeCanvas(true);
    });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => resizeCanvas(true), 250);
    });
  }

  signatureHandlersBound = true;
}
